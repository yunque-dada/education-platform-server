name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayhq/railway-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          project: lezao-pingtai
          service: web
          environment: production

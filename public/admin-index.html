<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 乐造编程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 20px; }
    .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .stat-number { font-size: 36px; font-weight: bold; color: #11998e; }
    .stat-label { color: #666; margin-top: 5px; }
    .section { background: white; border-radius: 15px; padding: 30px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h2 { color: #333; margin-bottom: 20px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn { background: #11998e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #0d8a7b; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: #333; }
    tr:hover { background: #f8f9fa; }
    .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .role-admin { background: #ffeaa7; color: #d63031; }
    .role-student { background: #dfe6e9; color: #2d3436; }
    .role-teacher { background: #a29bfe; color: white; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 15px; padding: 30px; width: 90%; max-width: 400px; }
    .modal h3 { margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #555; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .toast { position: fixed; top: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 25px; border-radius: 10px; display: none; }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>🔧 管理后台</h1>
      <div class="user-info">
        <span id="userName"></span>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </div>
  </header>
  
  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="userCount">0</div>
        <div class="stat-label">用户总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="adminCount">0</div>
        <div class="stat-label">管理员</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="projectCount">0</div>
        <div class="stat-label">作品总数</div>
      </div>
    </div>
    
    <div class="section">
      <h2>👥 用户管理</h2>
      <div class="toolbar">
        <button class="btn" onclick="showAddUser()">+ 添加用户</button>
        <button class="btn" onclick="loadUsers()">🔄 刷新</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>昵称</th>
            <th>角色</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="usersList"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="addUserModal">
    <div class="modal-content">
      <h3>添加用户</h3>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="newUsername" placeholder="3-20个字符">
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="newNickname" placeholder="显示名称">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="newPassword" placeholder="至少6个字符">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="newRole">
          <option value="student">学生</option>
          <option value="teacher">老师</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn" onclick="addUser()">添加</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">操作成功</div>

  <script>
    const API = "";
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    
    if (!token || user.role !== "admin") location.href = "admin-login.html";
    document.getElementById("userName").textContent = user.nickname || user.username;
    
    function logout() {
      localStorage.clear();
      location.href = "admin-login.html";
    }
    
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }
    
    function showAddUser() { document.getElementById("addUserModal").classList.add("show"); }
    function closeModal() { document.getElementById("addUserModal").classList.remove("show"); }
    
    async function loadUsers() {
      try {
        const res = await fetch(API + "/api/admin/users", {
          headers: { "Authorization": "Bearer " + token }
        });
        const users = await res.json();
        
        document.getElementById("userCount").textContent = users.length;
        document.getElementById("adminCount").textContent = users.filter(u => u.role === "admin").length;
        document.getElementById("projectCount").textContent = 0;
        
        const tbody = document.getElementById("usersList");
        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.nickname || "-"}</td>
            <td><span class="role-badge role-${u.role}">${u.role}</span></td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
            <td>
              ${u.role !== "admin" ? '<button class="btn btn-danger" onclick="deleteUser(' + u.id + ')">删除</button>' : "-"}
            </td>
          </tr>
        `).join("");
      } catch(e) { console.error(e); }
    }
    
    async function addUser() {
      const username = document.getElementById("newUsername").value;
      const nickname = document.getElementById("newNickname").value;
      const password = document.getElementById("newPassword").value;
      const role = document.getElementById("newRole").value;
      
      if (!username || !password) { showToast("请填写完整信息"); return; }
      
      try {
        const res = await fetch(API + "/api/admin/users", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({ username, nickname, password, role })
        });
        const data = await res.json();
        if (data.message) {
          showToast("添加成功");
          closeModal();
          loadUsers();
        } else {
          showToast(data.error || "添加失败");
        }
      } catch(e) { showToast("网络错误"); }
    }
    
    async function deleteUser(id) {
      if (!confirm("确定要删除这个用户吗？")) return;
      try {
        const res = await fetch(API + "/api/admin/users/" + id, {
          method: "DELETE",
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        if (data.message) {
          showToast("删除成功");
          loadUsers();
        } else {
          showToast(data.error || "删除失败");
        }
      } catch(e) { showToast("网络错误"); }
    }
    
    loadUsers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐造编程 - 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .content-section { display: none; }
    .content-section.active { display: block; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--background); color: var(--foreground); box-sizing: border-box; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">管</div>
        <span class="logo-text">管理后台</span>
      </div>
      <nav class="nav">
        <a class="nav-item active" onclick="showSection('dashboard')" id="nav-dashboard">
          <i class="fas fa-tachometer-alt"></i> 控制台
        </a>
        <a class="nav-item" onclick="showSection('users')" id="nav-users">
          <i class="fas fa-users"></i> 用户管理
        </a>
        <a class="nav-item" onclick="showSection('roles')" id="nav-roles">
          <i class="fas fa-user-tag"></i> 角色管理
        </a>
        <a class="nav-item" onclick="showSection('projects')" id="nav-projects">
          <i class="fas fa-folder-open"></i> 作品管理
        </a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> 退出登录
        </a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title" id="pageTitle">控制台</h1>
      </div>
      <div id="content-dashboard" class="content-section active">
        <div class="grid grid-cols-4">
          <div class="stat-card fade-in"><div class="stat-value" id="stat-users">-</div><div class="stat-label">用户总数</div></div>
          <div class="stat-card success fade-in"><div class="stat-value" id="stat-admins">-</div><div class="stat-label">管理员</div></div>
          <div class="stat-card warning fade-in"><div class="stat-value" id="stat-teachers">-</div><div class="stat-label">老师</div></div>
          <div class="stat-card info fade-in"><div class="stat-value" id="stat-students">-</div><div class="stat-label">学生</div></div>
        </div>
      </div>
      <div id="content-users" class="content-section">
        <div class="table-container fade-in">
          <div class="card-header">
            <h2 class="card-title">用户列表</h2>
            <button class="btn btn-primary" onclick="openUserModal()"><i class="fas fa-plus"></i> 添加用户</button>
          </div>
          <table class="table">
            <thead><tr><th>用户</th><th>角色</th><th>操作</th></tr></thead>
            <tbody id="usersTableBody"><tr><td colspan="3" class="text-center text-muted">加载中...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div id="content-roles" class="content-section">
        <div class="card fade-in">
          <h2 class="card-title">角色说明</h2>
          <div class="grid grid-cols-3">
            <div class="stat-card"><div style="font-weight:600;color:var(--primary)">管理员</div><div style="font-size:14px;color:var(--foreground-muted)">拥有所有权限</div></div>
            <div class="stat-card"><div style="font-weight:600;color:var(--success)">老师</div><div style="font-size:14px;color:var(--foreground-muted)">管理课程、作品</div></div>
            <div class="stat-card"><div style="font-weight:600;color:var(--warning)">学生</div><div style="font-size:14px;color:var(--foreground-muted)">学习课程</div></div>
          </div>
        </div>
      </div>
      <div id="content-projects" class="content-section">
        <div class="table-container fade-in">
          <div class="card-header"><h2 class="card-title">作品列表</h2></div>
          <table class="table">
            <thead><tr><th>作品名称</th><th>作者</th><th>时间</th><th>操作</th></tr></thead>
            <tbody id="projectsTableBody"><tr><td colspan="4" class="text-center text-muted">加载中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 用户编辑弹窗 -->
  <div class="modal" id="userModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">添加用户</h3>
        <button class="btn btn-ghost" onclick="closeUserModal()"><i class="fas fa-times"></i></button>
      </div>
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="userName" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>密码 <span id="passwordHint" style="font-weight:normal;color:var(--foreground-muted)"></span></label>
        <input type="password" id="userPassword" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="userRole">
          <option value="student">学生</option>
          <option value="teacher">老师</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeUserModal()">取消</button>
        <button class="btn btn-primary" onclick="saveUser()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let allUsers = [];
    
    function showSection(section) {
      document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
      document.getElementById('content-' + section).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + section).classList.add('active');
      const titles = {dashboard:'控制台',users:'用户管理',roles:'角色管理',projects:'作品管理'};
      document.getElementById('pageTitle').textContent = titles[section] || section;
      loadSectionData(section);
    }
    async function loadSectionData(section) {
      const token = localStorage.getItem('token');
      if(!token){window.location.href='/login.html';return;}
      try{
        const res = await fetch('/api/admin/'+section,{headers:{'Authorization':'Bearer '+token}});
        if(res.status===401){logout();return;}
        const data = await res.json();
        if(section==='dashboard'){
          document.getElementById('stat-users').textContent = data.total || '-';
          document.getElementById('stat-admins').textContent = data.admins || '-';
          document.getElementById('stat-teachers').textContent = data.teachers || '-';
          document.getElementById('stat-students').textContent = data.students || '-';
        }else if(section==='users'){renderUsersTable(data);}
        else if(section==='projects'){renderProjectsTable(data);}
      }catch(err){console.error(err);}
    }
    function renderUsersTable(users){
      allUsers = users || [];
      const tbody = document.getElementById('usersTableBody');
      if(!allUsers||allUsers.length==0){tbody.innerHTML='<tr><td colspan=3 class=text-center text-muted>暂无数据</td></tr>';return;}
      tbody.innerHTML = allUsers.map(u=>'<tr><td><div class="flex items-center gap-sm"><div class="avatar avatar-sm" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)">'+u.username.charAt(0).toUpperCase()+'</div><div>'+u.username+'</div></div></td><td><span class="badge badge-'+(u.role==='admin'?'primary':u.role==='teacher'?'success':'warning')+'">'+u.role+'</span></td><td><button class="btn btn-ghost btn-sm" onclick="editUser('+u.id+')"><i class="fas fa-edit"></i></button> <button class="btn btn-ghost btn-sm text-danger" onclick="deleteUser('+u.id+')"><i class="fas fa-trash"></i></button></td></tr>').join('');
    }
    function openUserModal(userId) {
      const modal = document.getElementById('userModal');
      if (userId) {
        const user = allUsers.find(u => u.id === userId);
        if (user) {
          document.getElementById('modalTitle').textContent = '编辑用户';
          document.getElementById('editUserId').value = user.id;
          document.getElementById('userName').value = user.username;
          document.getElementById('userPassword').value = '';
          document.getElementById('userRole').value = user.role;
          document.getElementById('passwordHint').textContent = '(留空则不修改密码)';
        }
      } else {
        document.getElementById('modalTitle').textContent = '添加用户';
        document.getElementById('editUserId').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userRole').value = 'student';
        document.getElementById('passwordHint').textContent = '';
      }
      modal.classList.add('active');
    }
    function closeUserModal() {
      document.getElementById('userModal').classList.remove('active');
    }
    async function saveUser() {
      const token = localStorage.getItem('token');
      const userId = document.getElementById('editUserId').value;
      const username = document.getElementById('userName').value;
      const password = document.getElementById('userPassword').value;
      const role = document.getElementById('userRole').value;
      
      if (!username) return alert('请输入用户名');
      if (!userId && !password) return alert('请输入密码');
      
      try {
        let url = '/api/admin/users';
        let method = 'POST';
        let body = { username, password, role };
        
        if (userId) {
          url = '/api/admin/users/' + userId;
          method = 'PUT';
          body = { role };
          if (password) body.password = password;
        }
        
        const res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(body)
        });
        
        if (res.ok) {
          closeUserModal();
          loadSectionData('users');
        } else {
          const err = await res.json();
          alert(err.error || '操作失败');
        }
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }
    function editUser(userId) {
      openUserModal(userId);
    }
    async function deleteUser(userId) {
      if (!confirm('确定要删除这个用户吗？')) return;
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/admin/users/' + userId, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          loadSectionData('users');
        } else {
          const err = await res.json();
          alert(err.error || '删除失败');
        }
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }
    function renderProjectsTable(projects){
      const tbody = document.getElementById('projectsTableBody');
      if(!projects||projects.length==0){tbody.innerHTML='<tr><td colspan=4 class=text-center text-muted>暂无数据</td></tr>';return;}
      tbody.innerHTML = projects.map(p=>'<tr><td>'+p.name+'</td><td>-</td><td>'+(p.created_at?new Date(p.created_at).toLocaleDateString():'-')+'</td><td><button class="btn btn-ghost btn-sm"><i class="fas fa-eye"></i></button></td></tr>').join('');
    }
    function logout(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='/login.html';}
    document.getElementById('userModal').addEventListener('click', function(e) {
      if (e.target === this) closeUserModal();
    });
    loadSectionData('dashboard');
  </script>
</body>
</html>

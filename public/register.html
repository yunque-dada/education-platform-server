<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐造编程 - 注册</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 90%;
      max-width: 400px;
    }
    h1 { text-align: center; color: #333; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
    input { 
      width: 100%; padding: 14px; border: 2px solid #e0e0e0; 
      border-radius: 10px; font-size: 16px;
    }
    input:focus { outline: none; border-color: #667eea; }
    button { 
      width: 100%; padding: 14px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    button:hover { transform: translateY(-2px); }
    .links { text-align: center; margin-top: 20px; }
    .links a { color: #667eea; text-decoration: none; }
    .error { color: #e74c3c; text-align: center; margin-top: 10px; }
    .success { color: #27ae60; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 加入乐造</h1>
    <form id="form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" required placeholder="3-20个字符">
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="nickname" placeholder="显示名称">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" required placeholder="至少6个字符">
      </div>
      <button type="submit">注册</button>
      <div class="error" id="error"></div>
      <div class="success" id="success"></div>
    </form>
    <div class="links">
      <a href="login.html">已有账号？立即登录</a>
    </div>
  </div>
  <script>
    const API = "";
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const nickname = document.getElementById("nickname").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");
      const success = document.getElementById("success");
      error.textContent = "";
      success.textContent = "";
      
      try {
        const res = await fetch(API + "/api/auth/register", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username, nickname, password})
        });
        const data = await res.json();
        if (data.message || data.userId) {
          success.textContent = "注册成功！正在跳转...";
          setTimeout(() => location.href = "login.html", 1500);
        } else {
          error.textContent = data.error || "注册失败";
        }
      } catch (e) {
        error.textContent = "网络错误";
      }
    });
  </script>
</body>
</html>

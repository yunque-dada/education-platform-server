<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐造编程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; color: white; }
    .logo { font-size: 80px; font-weight: bold; margin-bottom: 20px; }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { font-size: 20px; opacity: 0.9; margin-bottom: 40px; }
    .btn-group { display: flex; gap: 20px; justify-content: center; }
    .btn { padding: 14px 40px; background: white; color: #667eea; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 16px; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">乐造编程</div>
    <h1>欢迎来到乐造编程</h1>
    <p>Scratch | Python | 乐高机器人</p>
    <div class="btn-group">
      <a href="/login.html" class="btn">管理员登录</a>
    </div>
  </div>
</body>
</html>
